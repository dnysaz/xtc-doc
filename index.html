<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XtermChat — Docs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800">

<!-- ═══ OVERLAY (mobile) ═══ -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- ═══ MOBILE TOPBAR ═══ -->
<header id="topbar" class="lg:hidden fixed top-0 left-0 right-0 z-30 bg-white border-b border-slate-100 flex items-center justify-between px-4 h-14">
  <div class="flex items-center gap-2.5">
    <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center font-mono font-bold text-xs text-white">xtc</div>
    <span class="font-mono text-sm font-semibold text-slate-800">XtermChat</span>
  </div>
  <button onclick="openSidebar()" class="text-slate-400 hover:text-slate-700 p-2 rounded-lg hover:bg-slate-100 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
</header>

<!-- ═══ SIDEBAR ═══ -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-slate-100 z-40 flex flex-col">

  <!-- Brand -->
  <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-100 shrink-0">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0">
      <span class="text-white font-black text-xs" style="font-family:'JetBrains Mono',monospace">xtc</span>
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-sm font-bold text-slate-900">XtermChat</div>
      <div class="text-[10px] text-slate-400 font-mono">Documentation</div>
    </div>
    <button onclick="closeSidebar()" class="lg:hidden text-slate-400 hover:text-slate-700 p-1 shrink-0">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Nav — populated dynamically -->
  <nav id="nav" class="flex-1 overflow-y-auto py-3 px-3">
    <div class="text-[9px] font-bold uppercase tracking-[.15em] text-slate-300 px-2 mb-2 font-mono">Loading...</div>
  </nav>

  <!-- Footer links -->
  <div class="px-4 py-4 border-t border-slate-100 shrink-0 space-y-2">
    <a href="https://github.com/dnysaz/xtc-server" target="_blank"
      class="flex items-center gap-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-600 text-xs font-mono hover:border-blue-300 hover:text-blue-600 hover:bg-blue-50 transition-all no-underline">
      <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1.01.07 1.54 1.02 1.54 1.02.9 1.52 2.36 1.08 2.94.83.1-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.41.2 2.45.1 2.71.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.16.58.68.5C19.14 20.16 22 16.42 22 12c0-5.523-4.477-10-10-10z"/></svg>
      xtc-server ↗
    </a>
    <a href="https://github.com/dnysaz/xtc-client" target="_blank"
      class="flex items-center gap-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-600 text-xs font-mono hover:border-blue-300 hover:text-blue-600 hover:bg-blue-50 transition-all no-underline">
      <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1.01.07 1.54 1.02 1.54 1.02.9 1.52 2.36 1.08 2.94.83.1-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.41.2 2.45.1 2.71.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.16.58.68.5C19.14 20.16 22 16.42 22 12c0-5.523-4.477-10-10-10z"/></svg>
      xtc-client ↗
    </a>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<div id="main" class="lg:pl-64 min-h-screen flex flex-col">

  <!-- Topbar (desktop) -->
  <div id="desktopbar" class="hidden lg:flex sticky top-0 z-20 bg-white border-b border-slate-100 h-12 items-center px-8 gap-3">
    <span id="breadcrumb" class="text-xs text-slate-400 font-mono">—</span>
    <div class="ml-auto flex items-center gap-2">
      <span id="connDot" class="w-2 h-2 rounded-full bg-green-400"></span>
      <span class="text-xs text-slate-400 font-mono">v1.0.0</span>
    </div>
  </div>

  <!-- Content area -->
  <main class="flex-1 px-5 sm:px-8 lg:px-12 py-8 max-w-3xl mx-auto w-full">

    <!-- Loading state -->
    <div id="loading" class="flex items-center justify-center h-64 text-slate-300">
      <div class="text-center">
        <div class="text-3xl mb-3 font-mono">xtc</div>
        <div class="text-sm">Loading documentation...</div>
      </div>
    </div>

    <!-- Markdown content -->
    <div id="content" class="mt-10 md:mt-0 prose-doc hidden"></div>

    <!-- Page nav (prev/next) -->
    <div id="pagenav" class="hidden mt-12 pt-6 border-t border-slate-100 flex justify-between items-center gap-4">
      <button id="prevBtn" onclick="navigateDelta(-1)"
        class="flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-blue-600 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        <span id="prevLabel">Previous</span>
      </button>
      <button id="nextBtn" onclick="navigateDelta(1)"
        class="flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-blue-600 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
        <span id="nextLabel">Next</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

  </main>

  <footer class="px-5 sm:px-8 lg:px-12 py-6 border-t border-slate-100 max-w-3xl mx-auto w-full">
    <div class="flex justify-between items-center text-xs text-slate-300 font-mono">
      <span>XtermChat v1.0.0 · MIT License · March 2026</span>
      <span>xtermchat.vercel.app</span>
    </div>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
